version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: financial-postgres
    environment:
      POSTGRES_DB: financialdb
      POSTGRES_USER: finuser
      POSTGRES_PASSWORD: finpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finuser -d financialdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: financial-order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  loki:
    image: grafana/loki:3.0.0
    container_name: financial-loki
    ports:
      - "3100:3100"
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    container_name: financial-promtail
    volumes:
      - app_logs:/var/log/app
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.0
    container_name: financial-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  postgres_data:
  app_logs:
  loki_data:
  grafana_data:
