spring:
  application:
    name: financial-order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/financialdb
    username: finuser
    password: finpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.demo.financial: DEBUG
    org.hibernate.SQL: WARN
  file:
    name: logs/financial-demo.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{30}) - %msg%n"
